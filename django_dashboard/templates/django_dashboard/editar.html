<!DOCTYPE html>
<html>

<head>

<title>Editar tarefa</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#5f2c82,#8e44ad);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:35px;
border-radius:12px;
width:350px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

h2{
margin-top:0;
text-align:center;
color:#5f2c82;
}

form{
display:flex;
flex-direction:column;
gap:12px;
}

label{
font-size:14px;
font-weight:600;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:10px;
padding:10px;
background:#7d3cff;
border:none;
color:white;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#692ed6;
}

.voltar{
margin-top:10px;
text-align:center;
}

.voltar a{
text-decoration:none;
color:#7d3cff;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h2><i class="fa-solid fa-pen"></i> Editar tarefa</h2>

<form method="POST">

{% csrf_token %}

<label>Nome da tarefa</label>
<input name="nome" value="{{tarefa.nome}}" required>

<label>Data de conclusão</label>
<input type="date" name="data" value="{{tarefa.data_conclusao}}" required>

<label>Tipo</label>
<select name="tipo">

<option value="estudo" {% if tarefa.tipo == "estudo" %}selected{% endif %}>Estudo</option>
<option value="trabalho" {% if tarefa.tipo == "trabalho" %}selected{% endif %}>Trabalho</option>
<option value="pessoal" {% if tarefa.tipo == "pessoal" %}selected{% endif %}>Pessoal</option>

</select>

<button type="submit">
<i class="fa-solid fa-floppy-disk"></i>
Salvar
</button>

</form>

<div class="voltar">
<a href="/todo/">
<i class="fa-solid fa-arrow-left"></i>
Voltar para lista
</a>
</div>

</div>

</body>

</html>
