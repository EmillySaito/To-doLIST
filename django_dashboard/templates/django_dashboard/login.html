<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#5f2c82,#8e44ad);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
width:300px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
width:100%;
padding:10px;
border:none;
background:#7d3cff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#692ed6;
}

.icon{
margin-right:5px;
}

</style>

</head>

<body>

<div class="box">

<h2><i class="fa-solid fa-user"></i> Login</h2>

<form method="POST">

{% csrf_token %}

<input name="username" placeholder="Usuário">

<input type="password" name="password" placeholder="Senha">

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i>
Entrar
</button>

</form>

</div>

</body>
</html>
